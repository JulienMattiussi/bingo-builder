  /api/cards/delete-by-creator:
    post:
      summary: Delete all cards by creator
      description: Delete all cards created by a specific user
      tags:
        - cards
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                createdBy:
                  type: string
                  minLength: 1
