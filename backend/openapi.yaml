            description: MongoDB ObjectId
            example: 507f1f77bcf86cd799439011
          required: true
          description: MongoDB ObjectId
          name: id
          in: path
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                ownerId:
