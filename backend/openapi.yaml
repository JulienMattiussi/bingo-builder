      parameters:
        - schema:
            type: string
            pattern: ^[0-9a-fA-F]{24}$
            description: MongoDB ObjectId
            example: 507f1f77bcf86cd799439011
          required: true
          description: MongoDB ObjectId
          name: id
          in: path
        - schema:
            type: string
            description: Creator name for ownership verification
          required: false
          description: Creator name for ownership verification
          name: createdBy
          in: query
      responses:
        "200":
          description: Card deleted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessage"
        "403":
          description: Access forbidden (not the owner or card is published)
          content:
            application/json:
              schema:
